steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/nexus-elite', '.']

  # 2. Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/nexus-elite']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nexus-elite'
      - '--image'
      - 'gcr.io/$PROJECT_ID/nexus-elite'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'DB_SERVER=/cloudsql/$PROJECT_ID:us-central1:nexus-db'
      - '--add-cloudsql-instances'
      - '$PROJECT_ID:us-central1:nexus-db'

images:
  - 'gcr.io/$PROJECT_ID/nexus-elite'
